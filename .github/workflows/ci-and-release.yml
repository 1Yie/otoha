name: CI and release

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify Flutter and sidecar
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.6

      - name: Set up Node.js
        # zizmor: ignore[cache-poisoning] No package-manager cache is enabled.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libayatana-appindicator3-dev libgtk-3-dev libsecret-1-dev

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Resolve sidecar dependencies
        run: npm --prefix sidecar ci

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze Flutter source
        run: flutter analyze

      - name: Test Flutter application
        run: flutter test

      - name: Test YouTube sidecar
        run: npm --prefix sidecar test

  build-release:
    name: Build ${{ matrix.platform }} release
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            runner: ubuntu-latest
            target: linux
          - platform: Windows
            runner: windows-latest
            target: windows
          - platform: macOS
            runner: macos-latest
            target: macos
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.6

      - name: Set up Node.js
        # zizmor: ignore[cache-poisoning] No package-manager cache is enabled.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libayatana-appindicator3-dev libgtk-3-dev libsecret-1-dev

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Resolve production sidecar dependencies
        run: npm --prefix sidecar ci --omit=dev

      - name: Build ${{ matrix.platform }} release
        run: flutter build ${{ matrix.target }} --release
