name: otoha
version: 1.0.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-otoha: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: im.ingstar.otoha

apps:
  otoha:
    command: otoha
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-otoha
parts:
  otoha:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
